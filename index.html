<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIとレスキュー！魔法のウェブモンスター召喚カード</title>
    <!-- CSSファイルの読み込み -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- 
      ミッション: 
      バグだらけで崩れたモンスター召喚カードをレスキューしましょう！
      HTMLの構造は完成しています．CSS（style.css）のみを修正してください．
    -->

    <!-- カード全体のコンテナ -->
    <div class="card-container">
        
        <!-- モンスターの画像（巨大化バグが発生中） -->
        <img src="https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?w=800" alt="火炎獣ドラゴニアの画像" class="card-image">

        <!-- モンスターの名前 -->
        <h2 class="monster-name">火炎獣ドラゴニア</h2>

        <!-- モンスターの解説文 -->
        <p class="monster-description">
            火山の奥深くに生息する伝説 of 獣．その咆哮は大地を揺るがし，吐き出す炎はすべてを焼き尽くすと言われている．
        </p>

        <!-- ステータスリスト（縦に並んでしまっているバグが発生中） -->
        <ul class="status-list">
            <!-- 各ステータス項目 -->
            <li class="status-item">🔥 属性: 火</li>
            <li class="status-item">⚔️ 攻撃: 95</li>
            <li class="status-item">🛡️ 防御: 80</li>
        </ul>

        <!-- 召喚ボタン（地味で動かない状態） -->
        <button class="summon-button">モンスターを召喚する！</button>

    </div>

</body>
</html>
